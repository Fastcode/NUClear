site_name: NUClear Documentation
site_description: Documentation for the NUClear C++ reactive framework
site_author: NUClear Team
site_url: https://nuclear.readthedocs.io/

repo_name: Fastcode/NUClear
repo_url: https://github.com/Fastcode/NUClear

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

docs_dir: docs2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - mkdoxy:
      projects:
        nuclear:
          src-dirs: src
          full-doc: true
          doxy-cfg:
            FILE_PATTERNS: "*.hpp"
            RECURSIVE: "YES"
            JAVADOC_AUTOBRIEF: "YES"
            EXTRACT_ALL: "NO"
            EXTRACT_PRIVATE: "NO"
            EXTRACT_STATIC: "YES"
            HIDE_UNDOC_MEMBERS: "YES"
            HIDE_UNDOC_CLASSES: "YES"

